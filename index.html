<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jax Games</title>
    <style>
        /* Basic Reset and Theme */
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: white;
            overflow-x: hidden;
        }

        /* Header / Logo Section */
        header {
            display: flex;
            justify-content: flex-end;
            padding: 25px 50px;
        }

        .logo {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .jax { color: white; }
        .games-red { color: #ff4d4d; }

        /* Main Content */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }

        h1.section-title {
            font-size: 2.8rem;
            margin-top: 20px;
            margin-bottom: 50px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-bottom: 2px solid #333;
            display: inline-block;
            padding-bottom: 10px;
        }

        /* Button Grid Layout */
        .game-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 40px;
        }

        /* The Link Wrapper - keeps layout clean */
        .game-link {
            text-decoration: none;
            display: block;
        }

        /* Game Button Styling */
        .game-button {
            width: 200px;
            height: 200px;
            background-color: #1e1e1e;
            border: 4px solid transparent;
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            outline: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .game-button img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        /* Hover State applied via the link */
        .game-link:hover .game-button {
            border-color: #ff8080; 
            transform: scale(1.08) translateY(-10px);
            box-shadow: 0 15px 30px rgba(255, 77, 77, 0.3);
        }

        .game-link:hover img {
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <span class="jax">JAX</span> <span class="games-red">GAMES</span>
        </div>
    </header>

    <div class="container">
        <h1 class="section-title">Popular Games</h1>

        <div class="game-grid">
            <a href="https://jaxonm7.github.io/gtag/" class="game-link">

                    <img src="gtag.jpeg" alt="Gorilla Tag">
                </button>
            </a>

            <a href="https://jaxonm7.github.io/blockblast/" class="game-link">

                </button>
            </a>

            <a href="https://jaxonm7.github.io/minecraftpocket/" class="game-link">
                <button class="game-button">
                    <img src="pocketminecraft.png" alt="">
                </button>
            </a>

            <a href="https://jaxonm7.github.io/1v1.lol/" class="game-link">
                <button class="game-button">
                    <img src="6764d93be2b78_lol.onevone.png" alt="">
                </button>
            </a>
            
            <a href="https://jaxonm7.github.io/granny/" class="game-link">
                <button class="game-button">
                    <img src="unnamed.png" alt="">
                </button>
            </a>
            
            <a href="https://jaxonm7.github.io/cookieclicker/" class="game-link">

            </a>
            
            <a href="https://jaxonm7.github.io/fnaf1/" class="game-link">
                <button class="game-button">
                    <img src="freddy from fnaf1.avif" alt="">
                </button>
            </a>
        
            <a href="https://jaxonm7.github.io/fnaf2/" class="game-link">
                <button class="game-button">
                    <img src="fnaf2.png" alt="">
                </button>
             </a>
        
            <a href="https://jaxonm7.github.io/fnaf3/" class="game-link">
                <button class="game-button">
                    <img src="Screenshot 2026-06-02 214830.png" alt="">
                </button>

            <a href="https://jaxonm7.github.io/fnaf4/" class="game-link">

            </a>

                    <img src="hide n seek.png" alt="">

        </div>
    </div>

</body>
</html>
