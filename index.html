    <style>
        /* Basic Reset and Cyan Dark Theme */
        body {
            margin: 0;
            padding: 0;
            background-color: #0b1416;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #e0f7fa;
            overflow-x: hidden;
        }
        
        /* Header / Logo Section */
        header {
            display: flex;
            justify-content: flex-end;
            padding: 25px 50px;
        }

        .logo {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .jax { color: white; }
        .games-cyan { 
            color: #00e5ff; 
            text-shadow: 0 0 15px rgba(0, 229, 255, 0.6);
        }

        /* Main Content */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }

        h1.section-title {
            font-size: 2.8rem;
            margin-top: 20px;
            margin-bottom: 50px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-bottom: 2px solid #004d40;
            display: inline-block;
            padding-bottom: 10px;
            color: #80deea;
        }

        /* Button Grid Layout */
        .game-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 40px;
        }

        /* The Link Wrapper */
        .game-link {
            text-decoration: none;
            display: block;
        }

        /* Game Button Styling */
        .game-button {
            position: relative;
            width: 200px;
            height: 200px;
            background-color: #122326;
            border: 4px solid #004d56;
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            outline: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .game-button img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease, filter 0.3s ease;
        }

        /* Hover State */
        .game-link:hover .game-button {
            border-color: #00e5ff; 
            transform: scale(1.08) translateY(-10px);
            box-shadow: 0 10px 25px rgba(0, 229, 255, 0.4);
        }

        /* --- Loading Screen Overlay Inside Button --- */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(11, 20, 22, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 2;
        }

        /* Spinner Ring */
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(0, 229, 255, 0.2);
            border-top: 4px solid #00e5ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 10px;
        }

        /* Loading Text */
        .loading-text {
            color: #00e5ff;
            font-weight: bold;
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            animation: pulseText 1.5s ease-in-out infinite;
        }

        /* --- Active Clicked States via JavaScript --- */
        .game-button.is-loading {
            border-color: #b2f5ea !important; /* Light Cyan Border */
            box-shadow: 0 0 35px rgba(178, 245, 234, 0.8) !important; /* Bright Light Cyan Outer Glow */
            transform: scale(0.98) !important; /* Subtle press effect */
        }

        .game-button.is-loading .loading-overlay {
            opacity: 1;
        }

        .game-button.is-loading img {
            filter: blur(2px);
        }

        /* Keyframe Animations */
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes pulseText {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
    </style>
</head>

    <script>
        document.querySelectorAll('.game-link').forEach(link => {
            link.addEventListener('click', function(e) {
                // 1. Prevent immediate redirect to show off the animation
                e.preventDefault();
                
                const button = this.querySelector('.game-button');
                const targetUrl = this.href;

                // 2. Add the loading class (Triggers light cyan glow and animated spinner)
                button.classList.add('is-loading');

                // 3. Wait 1.2 seconds for the animation effect, then redirect!
                setTimeout(() => {
                    window.location.href = targetUrl;
                }, 1200);
            });
        });
    </script>
